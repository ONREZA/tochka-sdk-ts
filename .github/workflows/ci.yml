name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Regenerate types (must be up to date)
        run: |
          bun run gen
          if ! git diff --exit-code packages/tochka-sdk/src/_generated; then
            echo "::error::Generated types are out of sync. Run \`bun run gen\` locally."
            exit 1
          fi

      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@v3
        with:
          check-latest-tag-only: false

      - name: Verify commits
        run: cog check --from-latest-tag || cog check
