name: Sync OpenAPI

on:
  schedule:
    # Ежедневно в 03:00 UTC (06:00 МСК)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Sync spec and regenerate types
        id: sync
        run: |
          set +e
          bun run spec:sync
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 100 ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" -ne 0 ]; then
            exit $code
          fi

      - name: Extract API version
        if: steps.sync.outputs.no_changes != 'true'
        id: meta
        run: |
          version=$(jq -r '.info.version // "unknown"' specs/openapi.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify build still passes
        if: steps.sync.outputs.no_changes != 'true'
        run: |
          bun run lint
          bun run typecheck
          bun run build

      - name: Add changeset
        if: steps.sync.outputs.no_changes != 'true'
        run: |
          mkdir -p .changeset
          branch="sync-openapi"
          slug=$(date -u +%Y%m%d-%H%M)
          cat > ".changeset/sync-openapi-${slug}.md" <<'EOF'
          ---
          "@onreza/tochka-sdk": patch
          ---

          Sync with Tochka OpenAPI spec. See PR description for a path-level diff.
          EOF

      - name: Create Pull Request
        if: steps.sync.outputs.no_changes != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/openapi
          title: "chore(spec): sync OpenAPI → ${{ steps.meta.outputs.version }}"
          body-path: .sync-report.md
          commit-message: "chore(spec): sync OpenAPI → ${{ steps.meta.outputs.version }}"
          labels: |
            spec-sync
            autogenerated
          delete-branch: true
